name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: make
      env:
        DEVKITARM: /opt/devkitpro/devkitARM

    - name: Upload GBA binary
      uses: actions/upload-artifact@v4
      with:
        name: chroma.gba
        path: chroma.gba

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: chroma.gba

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libelf-dev libpng-dev \
          libsqlite3-dev libedit-dev python3-pip
        pip3 install --break-system-packages Pillow

    - name: Build mGBA library
      run: |
        git clone --depth 1 https://github.com/mgba-emu/mgba.git /tmp/mgba-build
        mkdir -p /tmp/mgba-build/build
        cd /tmp/mgba-build/build
        cmake .. -DBUILD_QT=OFF -DBUILD_SDL=OFF \
          -DUSE_EPOXY=OFF -DUSE_FFMPEG=OFF -DUSE_LIBZIP=OFF \
          -DUSE_DISCORD_RPC=OFF -DUSE_LUA=OFF -DUSE_LZMA=OFF \
          -DENABLE_VFS_FD=ON -DENABLE_VFS=ON -DENABLE_DIRECTORIES=ON
        make -j$(nproc)

    - name: Build test runner
      run: |
        cc -O2 \
          -I/tmp/mgba-build/include -I/tmp/mgba-build/build/include -I/tmp/mgba-build/src \
          -include /tmp/mgba-build/build/include/mgba/flags.h \
          -DM_CORE_GB -DM_CORE_GBA -DMGBA_DLL \
          -o test_roms/mgba_runner test_roms/mgba_runner.c \
          -L/tmp/mgba-build/build -lmgba -Wl,-rpath,/tmp/mgba-build/build

    - name: Run custom ROM visual tests
      run: |
        python3 test_roms/run_tests.py \
          -t ei_delay_test \
          -t halt_bug_test \
          -t jr_hram_test \
          -t rst_timing_test \
          -t sprite_limit_test \
          -t timer_accuracy_test
      env:
        LD_LIBRARY_PATH: /tmp/mgba-build/build

    - name: Run RST timing test
      run: python3 test_roms/test_rst_timing.py
      env:
        LD_LIBRARY_PATH: /tmp/mgba-build/build

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: chroma.gba

    - name: Get short SHA
      id: sha
      run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Create/update latest release
      run: |
        gh release delete latest --yes 2>/dev/null || true
        gh release create latest chroma.gba \
          --title "Latest build (${{ steps.sha.outputs.short }})" \
          --notes "Built from [\`${{ steps.sha.outputs.short }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
          --prerelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-demo:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: chroma.gba

    - name: Get short SHA
      id: sha
      run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Update web demo with latest build
      run: |
        cp chroma.gba docs/chroma.gba
        # Inject build version into the page
        sed -i "s|Game Boy \&middot; Game Boy Color \&middot; on GBA|Game Boy \&middot; Game Boy Color \&middot; on GBA<br><span style=\"font-size:0.7em;color:#334\">build ${{ steps.sha.outputs.short }}</span>|" docs/index.html

    - name: Deploy to GitHub Pages
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -f docs/chroma.gba docs/index.html
        git commit -m "Deploy web demo (build ${{ steps.sha.outputs.short }})" || true
        git push
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
